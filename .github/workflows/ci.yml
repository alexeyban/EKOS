name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ekos/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ekos/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (all crates)
        working-directory: ekos
        run: cargo build --workspace

      - name: Test (unit + integration)
        working-directory: ekos
        run: cargo test --workspace

      - name: Clippy (no warnings)
        working-directory: ekos
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        working-directory: ekos
        run: cargo fmt --check

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            benchmark/target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('benchmark/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      - name: Run benchmarks
        working-directory: benchmark
        run: cargo bench

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: criterion-report
          path: benchmark/target/criterion
