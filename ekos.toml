# EKOS workspace configuration

[workspace]
root = "."
log-level = "info"
log-format = "pretty"  # "pretty" | "json"

[observe]
paths = ["."]
ignore-patterns = [
    ".ekos",
    ".git",
    "target",
    "node_modules",
    "*.lock",
]

